spring:
  application:
    name: smartdoc-processor

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/smartdoc_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA / Hibernate ───────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway ────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Jackson ───────────────────────────────────────────────
  jackson:
    default-property-inclusion: NON_NULL

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── App config ────────────────────────────────────────────
app:
  jwt:
    secret: "ThisIsAVeryLongSecretKeyForJWTSigningMustBe256BitsLongAtLeast!!"
    expiration-ms: 86400000

# ── Swagger ───────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html          # this controls the redirect path
    try-it-out-enabled: true
    operations-sorter: method

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    com.smartdoc: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO